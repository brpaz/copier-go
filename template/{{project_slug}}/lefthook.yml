# Lefthook configuration file
# Check https://lefthook.dev/configuration/index.html
commit-msg:
  commands:
    commitlint:
      run: commitlint

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.go"
      run: golangci-lint run --fix {staged_files}
      stage_fixed: true
    docs:
      run: task gomarkdoc
      glob: "*.go"
      stage_fixed: true
    tests:
      glob: "*.go"
      run: task test
