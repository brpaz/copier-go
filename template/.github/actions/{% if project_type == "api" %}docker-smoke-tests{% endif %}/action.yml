name: "Docker Image Smoke Test"
description: "Run smoke tests on a Docker image by starting a container and performing health checks"
inputs:
  image-tag:
    description: "The Docker image tag to test"
    required: true
  port:
    description: "The port to test (default: 8080)"
    required: false
    default: "8080"
  container-port:
    description: "The container port to expose (default: 80)"
    required: false
    default: "80"
  timeout:
    description: "Timeout in seconds to wait for the port (default: 30)"
    required: false
    default: "30"

runs:
  using: "composite"
  steps:
    - name: Run smoke tests
      shell: bash
      run: |
        set -e

        # Function to print debug information and cleanup on failure
        cleanup_on_failure() {
          echo "❌ $1"
          echo ""
          echo "🔍 Image information:"
          echo "─────────────────────────────────────"
          docker image inspect ${{ inputs.image-tag }} | jq '.[] | {Id, RepoTags, Size, Created, Config: {Cmd, Entrypoint, WorkingDir}}'
          echo "─────────────────────────────────────"
          echo ""
          echo "📋 Container logs:"
          echo "─────────────────────────────────────"
          docker logs $CONTAINER_ID
          echo "─────────────────────────────────────"
          docker stop $CONTAINER_ID && docker rm $CONTAINER_ID
          exit 1
        }

        echo "🚀 Starting container..."
        CONTAINER_ID=$(docker run -d -p ${{ inputs.port }}:${{ inputs.container-port }} ${{ inputs.image-tag }})
        echo "✅ Container started: $CONTAINER_ID"

        # Wait for container to be healthy
        echo "⏳ Waiting for container to be healthy..."
        START_TIME=$(date +%s)

        while true; do
          HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER_ID 2>/dev/null || echo "none")

          if [ "$HEALTH_STATUS" = "healthy" ]; then
            ELAPSED=$(($(date +%s) - START_TIME))
            echo "✅ Container is healthy! (took ${ELAPSED}s)"
            break
          fi

          if [ "$HEALTH_STATUS" = "unhealthy" ]; then
            cleanup_on_failure "Container is unhealthy"
          fi

          ELAPSED=$(($(date +%s) - START_TIME))
          if [ $ELAPSED -ge ${{ inputs.timeout }} ]; then
            cleanup_on_failure "Timeout after ${{ inputs.timeout }}s (health status: $HEALTH_STATUS)"
          fi

          sleep 1
        done

        # Verify HTTP response
        echo "🔍 Verifying HTTP response..."
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ inputs.port }} 2>/dev/null || echo "0")

        if [ "$STATUS" = "200" ]; then
          echo "✅ HTTP health check passed! (status: $STATUS)"
        else
          cleanup_on_failure "HTTP health check failed (status: $STATUS)"
        fi

        # Cleanup
        echo "🧹 Cleaning up..."
        docker stop $CONTAINER_ID > /dev/null && docker rm $CONTAINER_ID > /dev/null
        echo "✅ Smoke tests completed successfully!"
